# This yml file contains all the CICD Jobs in charge of performing nirelease pushes

spec:
  inputs:
    # --- Required ---


    # --- Optional ---

    # Job Stages
    stage:
      type: string
      description: "Stage name for the package jobs"
      default: release


---


include:

  # Nirelease builds for zynq, linux and windows setup (digital signature)
  - component: $CI_SERVER_FQDN/cicd-catalogs/ni-release-catalog/ni-release-generic@~latest
    inputs:
      job_name: zynq-linux-windowssetup
      stage: $[[ inputs.stage ]]

      job_dependencies:
        - build_zynq  

        # MUST match name in .gitlab-ci/build-jobs.yml. Cannot do with VARIABLES
        - build_ubuntu_all_arch

        - digital_signature


      ni_release_files: 
        # Used by pipelines such as dt5771-backend (TODO: Check if really needed)
        - ni_release_file: .ni/ni-release-zynq.yaml
          gitlab_release_name: 'ni-release-zynq'

        # Used by Sci-Compiler/Core
        - ni_release_file: .ni/ni-release-setup.yaml
          gitlab_release_name: 'ni-release-setup'

      job_rules: 
        - if: $CI_COMMIT_TAG



  # Deploy pages to AWS S3
  - component: $CI_SERVER_FQDN/cicd-catalogs/aws-s3/cloudfront-static-hosting@~latest
    inputs:
      stage: $[[ inputs.stage ]]
      job_name: deploy_pages
      dependencies: 
        - pages
      rules:
        - if: $CI_COMMIT_TAG

      folder_to_sync: public
      aws_bucket: $SCISDK_DOCS_AWS_BUCKET
      distribution_id: $SCISDK_DOCS_AWS_DISTRIBUTION_ID


