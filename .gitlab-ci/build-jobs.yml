# This yml file contains all the CICD Jobs in charge of building the SciSDK

spec:
  inputs:
    # --- Required ---
    build_ubuntu_all_arch_job_name:
      type: string
      description: "Name of the build_ubuntu_all_arch job"


    # --- Optional ---

    # Job Stages
    stage:
      type: string
      description: "Stage name for the build jobs"
      default: build

    # Rules
    rules:
      type: array
      description: "The rules to include/exlucde the jobs from the pipeline"
      default: 
        - if: $CI_COMMIT_TAG


---



build_vs2022_windows:
  stage: $[[ inputs.stage ]]
  image: harbor.nuclearinstruments.eu/windows/win10-vc-build-tools-2022:1
  tags:
    - docker-windows

  script:
    - ./build.ps1 $CI_COMMIT_TAG

  artifacts:
    untracked: false
    name: windows
    paths:
      - output\scisdk-full.zip  

  rules: $[[ inputs.rules ]]



build_zynq:
  stage: $[[ inputs.stage ]]
  image: harbor.nuclearinstruments.eu/nibuntu/console-20.04:3.0
  tags:
    - docker-linux
    - heavy

  script:
    - echo $CI_COMMIT_TAG>VERSION
    - ./compile_for_zynq.sh $CI_COMMIT_TAG

  artifacts:
    untracked: false
    paths:
      - build_zynq/scisdk-zynq.tar.gz

  rules: $[[ inputs.rules ]]



$[[ inputs.build_ubuntu_all_arch_job_name ]]:
  stage: $[[ inputs.stage ]]
  tags:
    - docker-linux
    - heavy

  parallel:
      matrix:
        - DOCKER_IMAGE: ["18.04", "20.04", "22.04", "24.04"]
          ARCHITECTURE: ["x64", "i386", "arm64", "armhf"]
  variables:
      DOCKER_IMAGE_MAP: "18.04=bionic,20.04=focal,22.04=jammy,24.04=noble"
  
  image: harbor.nuclearinstruments.eu/nibuntu/build-$DOCKER_IMAGE:latest
  #image: registry.lanni/nibuntu/build-20.04:latest
  #variables:
  #  LINUXRELEASE: "focal"
  script:
    - export LINUXRELEASE=$(echo "$DOCKER_IMAGE_MAP" | awk -F, -v linuxrelease="$DOCKER_IMAGE" '{for(i=1;i<=NF;i++) if ($i ~ linuxrelease) print $i}' | cut -d'=' -f2)
    - echo "Build on $DOCKER_IMAGE"
    - echo "Build for release  $LINUXRELEASE" 
    - echo $CI_COMMIT_TAG>VERSION
    - mkdir -p tars
    - mkdir -p debs    
    - ./compile_all_architecures.sh $CI_COMMIT_TAG

  artifacts:
    untracked: false
    paths:
      - tars/**  
      - debs/**

  rules: $[[ inputs.rules ]]