# This yml file contains all the CICD Jobs in charge of building the SciSDK

spec:
  inputs:
    # --- Required ---

    # --- Optional ---

    # Job Stages
    stage:
      type: string
      description: "Stage name for the build jobs"
      default: build

    # Rules
    rules:
      type: array
      description: "The rules to include/exlucde the jobs from the pipeline"
      default: 
        - if: $CI_COMMIT_TAG


---



build_vs2022_windows:
  stage: $[[ inputs.stage ]]
  image: harbor.nuclearinstruments.eu/windows/win10-vc-build-tools-2022:1
  tags:
    - docker-windows

  script:
    - ./build.ps1 $CI_COMMIT_TAG

  artifacts:
    untracked: false
    name: windows
    paths:
      - output\scisdk-full.zip  

  rules: $[[ inputs.rules ]]



build_zynq:
  stage: $[[ inputs.stage ]]
  image: harbor.nuclearinstruments.eu/nibuntu/console-20.04:3.0
  tags:
    - docker-linux
    - heavy

  script:
    - echo $CI_COMMIT_TAG>VERSION
    - ./compile_for_zynq.sh $CI_COMMIT_TAG

  artifacts:
    untracked: false
    paths:
      - build_zynq/scisdk-zynq.tar.gz

  rules: $[[ inputs.rules ]]



include:
  - component: $CI_SERVER_FQDN/cicd-catalogs/build-catalogs/nibuntu/nibuntu-all-arch@~latest
    inputs:
      job_name: build_ubuntu_all_arch
      stage: $[[ inputs.stage ]]
      runner_tags:
        - docker-linux
        - heavy

      script:
        - echo "Build on $DOCKER_IMAGE"
        - echo "Build for release  $LINUXRELEASE" 
        - echo $CI_COMMIT_TAG>VERSION

        - mkdir -p tars
        - mkdir -p debs

        - ./compile_all_architecures.sh $CI_COMMIT_TAG

      artifact_paths:
        - tars/**  
        - debs/**
      rules: $[[ inputs.rules ]]


