# This yml file contains all the CICD Jobs in charge of pushing binaries to package registries

spec:
  inputs:
    # --- Required ---


    # --- Optional ---

    # Job Stages
    stage:
      type: string
      description: "Stage name for the package push jobs"
      default: push-packages

    # Dependencies
    dependencies:
      type: string
      description: "Dependencies"
      default: build_ubuntu_all_arch

    # Rules
    rules:
      type: array
      description: "The rules to include/exlucde the jobs from the pipeline"
      default: 
        - if: $CI_COMMIT_TAG


---


include:
  - component: $CI_SERVER_FQDN/cicd-catalogs/build-catalogs/nibuntu/nibuntu@~latest
    inputs:
      job_name: deb_push
      stage: $[[ inputs.stage ]]
      runner_tags:
        - docker-linux
        - light
      dependencies: $[[ inputs.dependencies ]]

      script:
        # Debug print
        - ls -l
        - ls -l debs/

        - export LINUXRELEASE=$(echo "$DOCKER_IMAGE_MAP" | awk -F, -v linuxrelease="$DOCKER_IMAGE" '{for(i=1;i<=NF;i++) if ($i ~ linuxrelease) print $i}' | cut -d'=' -f2)
        - echo "Publishing for release  $LINUXRELEASE" 
        # - curl -X POST "http://packages-ubuntu.lanni/api/upload" -F "file=@./debs/scisdk_${CI_COMMIT_TAG}_${LINUXRELEASE}_${ARCHITECTURE}.deb" -F "distribution=${LINUXRELEASE}"

        - |
          TODO:
          CURL CON AUTENTICAZIONE
          CHECK RETURN CODE



      rules: $[[ inputs.rules ]]



deb_push:
  # stage: $[[ inputs.stage ]]
  # image: harbor.nuclearinstruments.eu/apps/release-manager:2
  # tags:
  #   - docker-linux
  #   - light

    
  # dependencies: 
  #   - build_ubuntu_all_arch

