# This yml file contains all the CICD Jobs in charge of pushing binaries to package registries

spec:
  inputs:
    # --- Required ---


    # --- Optional ---

    # Job Stages
    stage:
      type: string
      description: "Stage name for the package push jobs"
      default: push-packages

    # Rules
    rules:
      type: array
      description: "The rules to include/exlucde the jobs from the pipeline"
      default: 
        - if: $CI_COMMIT_TAG


---


include:
  - component: $CI_SERVER_FQDN/cicd-catalogs/build-catalogs/nibuntu/nibuntu-all-arch@~latest
    inputs:
      job_name: deb_push
      stage: $[[ inputs.stage ]]
      runner_tags:
        - docker-linux
        - light
      dependencies: 
        # MUST match name in .gitlab-ci/build-jobs.yml. Cannot do with VARIABLES
        - build_ubuntu_all_arch

      script:
        # Debug print
        - ls -l
        - ls -l debs/

        - echo "Publishing for release  $LINUXRELEASE" 

        # - curl -X POST "http://packages-ubuntu.lanni/api/upload" -F "file=@./debs/scisdk_${CI_COMMIT_TAG}_${LINUXRELEASE}_${ARCHITECTURE}.deb" -F "distribution=${LINUXRELEASE}"

        # POST deb
        # - OS=ubuntu
        # - |
        #   response=$( \
        #     curl --location '${NI_PACKAGE_REGISTRY_URL}/$OS/upload' \
        #     --header 'Authorization: ${NI_PACKAGE_REGISTRY_TOKEN}' \
        #     --form 'file=@./debs/scisdk_${CI_COMMIT_TAG}_${LINUXRELEASE}_${ARCHITECTURE}.deb"' \
        #     --form 'distribution=${LINUXRELEASE}"' \
        #     -s -w "\n%{http_code}" \
        #   )
        #   http_code=$(tail -n1 <<< "$response")
        #   echo $http_code
          
        # # Raise exception if return code is not 200
        # - |
        #   if [ "$http_code" != "200" ]; then
        #     exit 1
        #   fi


        - |
          OS=ubuntu

          MAX_RETRIES=5
          SLEEP_SECONDS=10
          
          attempt=1

          while [ $attempt -le $MAX_RETRIES ]; do
            echo "Upload attempt $attempt/$MAX_RETRIES..."

            echo "Location"
            echo '${NI_PACKAGE_REGISTRY_URL}/$OS/upload'

            file ./debs/scisdk_${CI_COMMIT_TAG}_${LINUXRELEASE}_${ARCHITECTURE}.deb

            response=$( \
              curl -X POST \
              --location "${NI_PACKAGE_REGISTRY_URL}/$OS/upload" \
              --header "Authorization: ${NI_PACKAGE_REGISTRY_TOKEN}" \
              --form "file=@./debs/scisdk_${CI_COMMIT_TAG}_${LINUXRELEASE}_${ARCHITECTURE}.deb" \
              --form "distribution=${LINUXRELEASE}" \
              -s -w "\n%{http_code}" \
            )
            http_code=$(tail -n1 <<< "$response")
            echo "HTTP code: $http_code"

            if [ "$http_code" = "200" ]; then
              echo "Upload succeeded."
              break
            fi

            if [ $attempt -lt $MAX_RETRIES ]; then
              echo "Upload failed. Retrying in $SLEEP_SECONDS seconds..."
              sleep $SLEEP_SECONDS
            fi

            attempt=$((attempt + 1))
          done

          if [ "$http_code" != "200" ]; then
            echo "Upload failed after $MAX_RETRIES attempts."
            exit 1
          fi

      rules: $[[ inputs.rules ]]



